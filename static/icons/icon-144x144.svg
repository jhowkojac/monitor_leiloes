<svg width="144" height="144" viewBox="0 0 144 144" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a68520;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="72" cy="72" r="70" fill="url(#grad1)" stroke="#8b7319" stroke-width="2"/>
  
  <!-- Hammer icon -->
  <g transform="translate(72, 72)">
    <!-- Hammer handle -->
    <rect x="-4" y="-20" width="8" height="40" fill="#8b4513" rx="2"/>
    
    <!-- Hammer head -->
    <rect x="-15" y="-25" width="30" height="12" fill="#696969" rx="2"/>
    <rect x="-12" y="-28" width="24" height="6" fill="#808080" rx="1"/>
    
    <!-- Gavel detail -->
    <line x1="-10" y1="-22" x2="10" y2="-22" stroke="#505050" stroke-width="1"/>
    <line x1="-10" y1="-19" x2="10" y2="-19" stroke="#505050" stroke-width="1"/>
  </g>
  
  <!-- Text "ML" -->
  <text x="72" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">ML</text>
</svg>
