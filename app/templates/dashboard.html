<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrativo - Monitor de Leilões</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card.primary {
            border-left: 4px solid #3498db;
        }

        .stat-card.success {
            border-left: 4px solid #2ecc71;
        }

        .stat-card.warning {
            border-left: 4px solid #f39c12;
        }

        .stat-card.danger {
            border-left: 4px solid #e74c3c;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #2c3e50;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .stat-change {
            color: #7f8c8d;
            font-size: 14px;
        }

        .stat-change.positive {
            color: #27ae60;
        }

        .stat-change.negative {
            color: #e74c3c;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            color: #2c3e50;
            font-size: 18px;
            font-weight: 600;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: #e9ecef;
        }

        .user-info {
            flex: 1;
        }

        .user-email {
            color: #2c3e50;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .user-meta {
            color: #7f8c8d;
            font-size: 12px;
        }

        .user-actions {
            display: flex;
            gap: 8px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .badge.admin {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge.active {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .badge.inactive {
            background: #ffebee;
            color: #c62828;
        }

        .badge.two-fa {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #3498db;
        }

        .health-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .health-status.healthy {
            background: #e8f5e8;
            color: #2e7d32;
        }

        .health-status.warning {
            background: #fff3e0;
            color: #f57c00;
        }

        .health-status.critical {
            background: #ffebee;
            color: #c62828;
        }

        .health-status.error {
            background: #ffebee;
            color: #c62828;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .chart-container {
            height: 300px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>Dashboard Administrativo</h1>
            <p>Monitoramento e gestão do sistema Monitor de Leilões</p>
        </div>

        <div id="error-message" class="error" style="display: none;"></div>

        <!-- Estatísticas Principais -->
        <div class="stats-grid" id="stats-grid">
            <div class="loading">
                <div class="loading-spinner"></div>
                Carregando estatísticas...
            </div>
        </div>

        <!-- Conteúdo Principal -->
        <div class="content-grid">
            <!-- Usuários Recentes -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Usuários Recentes</h2>
                </div>
                <div class="search-box">
                    <input type="text" class="search-input" id="user-search" placeholder="Buscar usuários...">
                </div>
                <div class="user-list" id="user-list">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        Carregando usuários...
                    </div>
                </div>
            </div>

            <!-- Saúde do Sistema -->
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Saúde do Sistema</h2>
                </div>
                <div id="system-health">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        Verificando sistema...
                    </div>
                </div>
            </div>
        </div>

        <!-- Estatísticas 2FA -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Estatísticas de 2FA</h2>
            </div>
            <div class="stats-grid" id="2fa-stats">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    Carregando estatísticas 2FA...
                </div>
            </div>
        </div>
    </div>

    <script>
        class DashboardManager {
            constructor() {
                this.init();
            }

            async init() {
                await this.loadDashboardData();
                this.bindEvents();
                this.setupAutoRefresh();
            }

            async loadDashboardData() {
                try {
                    const response = await fetch('/api/dashboard/stats');
                    const data = await response.json();

                    if (data.success) {
                        this.renderStats(data.data.overview);
                        this.renderRecentUsers(data.data.recent_users);
                        this.renderSystemHealth(data.data.system_health);
                        this.render2FAStats(data.data.two_fa_stats);
                    } else {
                        this.showError('Erro ao carregar dados do dashboard');
                    }
                } catch (error) {
                    this.showError('Erro de conexão: ' + error.message);
                }
            }

            renderStats(overview) {
                const statsGrid = document.getElementById('stats-grid');
                
                statsGrid.innerHTML = `
                    <div class="stat-card primary">
                        <div class="stat-label">Total de Usuários</div>
                        <div class="stat-value">${overview.total_users || 0}</div>
                        <div class="stat-change">Cadastrados no sistema</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-label">Usuários Ativos</div>
                        <div class="stat-value">${overview.active_users || 0}</div>
                        <div class="stat-change positive">Usuários ativos</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-label">Com 2FA</div>
                        <div class="stat-value">${overview.users_with_2fa || 0}</div>
                        <div class="stat-change">${overview.two_fa_adoption_rate || 0}% de adoção</div>
                    </div>
                    <div class="stat-card danger">
                        <div class="stat-label">Administradores</div>
                        <div class="stat-value">${overview.admin_users || 0}</div>
                        <div class="stat-change">Com acesso admin</div>
                    </div>
                `;
            }

            renderRecentUsers(users) {
                const userList = document.getElementById('user-list');
                
                if (users.length === 0) {
                    userList.innerHTML = '<p style="text-align: center; color: #7f8c8d;">Nenhum usuário encontrado</p>';
                    return;
                }

                userList.innerHTML = users.map(user => `
                    <div class="user-item">
                        <div class="user-info">
                            <div class="user-email">${user.email}</div>
                            <div class="user-meta">
                                Criado em ${this.formatDate(user.created_at)}
                            </div>
                        </div>
                        <div class="user-actions">
                            ${user.is_admin ? '<span class="badge admin">Admin</span>' : ''}
                            ${user.is_active ? '<span class="badge active">Ativo</span>' : '<span class="badge inactive">Inativo</span>'}
                            ${user.is_2fa_enabled ? '<span class="badge two-fa">2FA</span>' : ''}
                        </div>
                    </div>
                `).join('');
            }

            renderSystemHealth(health) {
                const healthContainer = document.getElementById('system-health');
                
                const statusClass = health.status || 'error';
                const statusText = {
                    healthy: 'Saudável',
                    warning: 'Atenção',
                    critical: 'Crítico',
                    error: 'Erro'
                }[statusClass] || 'Desconhecido';

                healthContainer.innerHTML = `
                    <div class="health-status ${statusClass}">
                        <div class="status-indicator"></div>
                        <span>Status: ${statusText}</span>
                    </div>
                    <div style="font-size: 14px; color: #7f8c8d;">
                        <div>Usuários: ${health.user_count || 0}</div>
                        <div>Administradores: ${health.admin_count || 0}</div>
                        <div>Ativos: ${health.active_count || 0}</div>
                        <div>Database: ${health.database_connected ? 'Conectado' : 'Desconectado'}</div>
                    </div>
                    ${health.issues && health.issues.length > 0 ? `
                        <div style="margin-top: 12px;">
                            <strong>Problemas:</strong>
                            <ul style="margin: 8px 0; padding-left: 20px; font-size: 12px; color: #e74c3c;">
                                ${health.issues.map(issue => `<li>${issue}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                `;
            }

            render2FAStats(stats) {
                const statsContainer = document.getElementById('2fa-stats');
                
                statsContainer.innerHTML = `
                    <div class="stat-card success">
                        <div class="stat-label">Com 2FA Ativo</div>
                        <div class="stat-value">${stats.enabled_2fa || 0}</div>
                        <div class="stat-change positive">Protegidos</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-label">Sem 2FA</div>
                        <div class="stat-value">${stats.disabled_2fa || 0}</div>
                        <div class="stat-change">Necessitam proteção</div>
                    </div>
                    <div class="stat-card primary">
                        <div class="stat-label">Taxa de Adoção</div>
                        <div class="stat-value">${stats.adoption_rate || 0}%</div>
                        <div class="stat-change">Dos usuários totais</div>
                    </div>
                `;
            }

            bindEvents() {
                // Busca de usuários
                const searchInput = document.getElementById('user-search');
                let searchTimeout;
                
                searchInput.addEventListener('input', (e) => {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        this.searchUsers(e.target.value);
                    }, 500);
                });
            }

            async searchUsers(query) {
                if (!query.trim()) {
                    await this.loadDashboardData();
                    return;
                }

                try {
                    const response = await fetch('/api/dashboard/search-users', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ query, limit: 10 })
                    });

                    const data = await response.json();

                    if (data.success) {
                        this.renderRecentUsers(data.data);
                    }
                } catch (error) {
                    console.error('Erro na busca:', error);
                }
            }

            setupAutoRefresh() {
                // Atualizar dashboard a cada 30 segundos
                setInterval(() => {
                    this.loadDashboardData();
                }, 30000);
            }

            formatDate(dateString) {
                if (!dateString) return 'Desconhecido';
                
                const date = new Date(dateString);
                return date.toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
            }

            showError(message) {
                const errorElement = document.getElementById('error-message');
                errorElement.textContent = message;
                errorElement.style.display = 'block';
                
                setTimeout(() => {
                    errorElement.style.display = 'none';
                }, 5000);
            }
        }

        // Inicializar quando a página carregar
        document.addEventListener('DOMContentLoaded', () => {
            new DashboardManager();
        });
    </script>
</body>
</html>
