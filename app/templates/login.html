<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Monitor de Leilões</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a32;
      --text: #e8e6e3;
      --muted: #8b8685;
      --accent: #c9a227;
      --accent-dim: #a68520;
      --success: #22c55e;
      --error: #dc2626;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.5;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }
    
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    
    .logo p {
      color: var(--muted);
      font-size: 0.875rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text);
    }
    
    .form-input {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .form-input::placeholder {
      color: var(--muted);
    }
    
    .login-button {
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .login-button:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }
    
    .login-button:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    
    .success-message {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.875rem;
    }
    
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    
    .back-link a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.875rem;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
    
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top: 2px solid currentColor;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <h1>🚗 Monitor de Leilões</h1>
        <p>Acesso ao sistema</p>
      </div>
      
      <div id="message-container"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="seu@email.com"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="••••••••"
            required
          >
        </div>
        
        <button type="submit" class="login-button" id="login-button">
          <span id="button-text">Entrar</span>
        </button>
      </form>
      
      <div class="back-link">
        <a href="/">← Voltar para o início</a>
      </div>
    </div>
  </div>

  <script>
    class LoginManager {
      constructor() {
        this.form = document.getElementById('login-form');
        this.button = document.getElementById('login-button');
        this.buttonText = document.getElementById('button-text');
        this.messageContainer = document.getElementById('message-container');
        
        this.init();
      }
      
      init() {
        this.form.addEventListener('submit', (e) => this.handleSubmit(e));
        
        // Verificar se já está logado
        this.checkAuthStatus();
      }
      
      async handleSubmit(e) {
        e.preventDefault();
        
        const formData = new FormData(this.form);
        const email = formData.get('email');
        const password = formData.get('password');
        
        await this.login(email, password);
      }
      
      async login(email, password) {
        this.setLoading(true);
        this.clearMessages();
        
        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, password }),
          });
          
          const data = await response.json();
          
          if (response.ok) {
            // Salvar tokens
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('refresh_token', data.refresh_token);
            localStorage.setItem('user', JSON.stringify(data.user));
            
            this.showMessage('Login realizado com sucesso! Redirecionando...', 'success');
            
            // Redirecionar após 1 segundo
            setTimeout(() => {
              window.location.href = '/';
            }, 1000);
            
          } else {
            this.showMessage(data.detail || 'Erro ao fazer login', 'error');
          }
          
        } catch (error) {
          this.showMessage('Erro de conexão. Tente novamente.', 'error');
        } finally {
          this.setLoading(false);
        }
      }
      
      async checkAuthStatus() {
        const token = localStorage.getItem('access_token');
        
        if (token) {
          try {
            const response = await fetch('/api/auth/verify', {
              headers: {
                'Authorization': `Bearer ${token}`,
              },
            });
            
            if (response.ok) {
              // Já está logado, redirecionar
              window.location.href = '/';
            }
          } catch (error) {
            // Token inválido, continuar na página de login
            this.clearTokens();
          }
        }
      }
      
      setLoading(loading) {
        this.button.disabled = loading;
        
        if (loading) {
          this.buttonText.innerHTML = '<span class="loading"></span> Entrando...';
        } else {
          this.buttonText.textContent = 'Entrar';
        }
      }
      
      showMessage(message, type) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `${type}-message`;
        messageDiv.textContent = message;
        
        this.messageContainer.appendChild(messageDiv);
      }
      
      clearMessages() {
        this.messageContainer.innerHTML = '';
      }
      
      clearTokens() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        localStorage.removeItem('user');
      }
    }
    
    // Inicializar quando o DOM estiver pronto
    document.addEventListener('DOMContentLoaded', () => {
      new LoginManager();
    });
  </script>
</body>
</html>
